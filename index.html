<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Dashboard | yegge.github.io</title>
    <style>
        :root {
            --brand-orange: #ff9800;
            --bg-dark: #000000;
            --bg-panel: #111111;
            --border-color: #333333;
            --text-main: #eeeeee;
            --text-muted: #888888;
            --hover-bg: #222222;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }

        h1 {
            color: var(--brand-orange);
            font-size: 36px;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 48px;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            background: var(--hover-bg);
            transform: translateY(-4px);
            border-color: var(--brand-orange);
            box-shadow: 0 8px 24px rgba(255, 152, 0, 0.1);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--brand-orange);
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Workspace Dashboard</h1>
        <div class="subtitle">Select an application to continue</div>
        
        <div class="grid">
            <a href="src/index.html" class="card">
                <div class="card-icon">✏️</div>
                <div class="card-title">Markdown Editor</div>
                <div class="card-desc">Write, format, and publish documents directly to the docs folder.</div>
            </a>
            
            <a href="Docs/index.html" class="card">
                <div class="card-icon">📂</div>
                <div class="card-title">Documents</div>
                <div class="card-desc">Browse and view all published HTML documents and files.</div>
            </a>
            
            <a href="contact/index.html" class="card">
                <div class="card-icon">✉️</div>
                <div class="card-title">Contact</div>
                <div class="card-desc">Get in touch via email or submit a feedback form.</div>
            </a>
        </div>
    </div>
</body>
</html>
