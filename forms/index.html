To link a stylesheet to an HTML document, you use the <link> element. This tag is placed inside the <head> section of your HTML file.

The Standard Method (External CSS)
This is the most common way to apply styles, as it keeps your design separate from your content.

HTML
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>list of forms go here</h1>
</body>
</html>
