<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yegge.github.io | File Generator</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            background-color: #000000;
            color: #b0b0b0;
            font-family: 'Inter', sans-serif;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        #editor-container {
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        h2 { color: #ff9800; margin-top: 0; }

        textarea {
            width: 100%;
            height: 350px;
            background: #050505;
            color: #eee;
            border: 1px solid #333;
            padding: 15px;
            font-family: monospace;
            box-sizing: border-box;
            border-radius: 4px;
            margin-bottom: 20px;
            outline: none;
        }
        
        textarea:focus { border-color: #ff9800; }

        .btn-group { display: flex; gap: 10px; }

        button {
            background: #ff9800;
            color: black;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover { background: #ffb74d; }
    </style>
</head>
<body>

    <div id="editor-container">
        <h2>yegge.github.io | HTML Generator</h2>
        <p>Paste content below. The filename will default to your first line of text.</p>
        
        <textarea id="input-text" placeholder="Project Title Goes Here...&#10;&#10;Then your body text..."></textarea>
        
        <div class="btn-group">
            <button onclick="downloadHTML()">Download Protected HTML</button>
        </div>
    </div>

    <script>
        function downloadHTML() {
            const input = document.getElementById('input-text').value;
            if (!input.trim()) return alert("Please enter some content.");

            // 1. Extract first line for default filename
            // We split by newline and grab index 0
            let defaultName = input.split('\n')[0].trim();
            
            // Clean up Markdown symbols (# or *) so they don't appear in the filename
            defaultName = defaultName.replace(/[#*`]/g, '').trim() || "protected-document";

            // 2. Prompt user to name the file
            let fileName = prompt("Enter a name for your file:", defaultName);
            
            // If user clicks cancel, exit function
            if (fileName === null) return;
            if (fileName.trim() === "") fileName = "protected-document";

            // Ensure it has the .html extension
            if (!fileName.toLowerCase().endsWith(".html")) {
                fileName += ".html";
            }

            // 3. Generate the HTML Content
            const htmlBody = marked.parse(input);

            const finalFile = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yegge.github.io Protected Document</title>
    <style>
        body {
            background-color: #000; color: #b0b0b0;
            font-family: 'Inter', sans-serif; line-height: 1.6;
            padding: 40px; max-width: 900px; margin: 0 auto;
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
        }
        h1, h2, h3 { color: #fff; font-weight: 700; margin-top: 1.5em; }
        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.4rem; border-bottom: 1px solid #222; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 1px solid #333; }
        th { background: #1a1a1a; color: #fff; padding: 12px; border: 1px solid #333; text-align: left; }
        td { padding: 12px; border: 1px solid #333; }
        tr td:first-child { font-weight: bold; color: #fff; }
        a { color: #ff9800; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr { border: 0; border-top: 1px solid #222; margin: 40px 0; }
    </style>
    <script>
        document.addEventListener('contextmenu', e => { e.preventDefault(); alert('Protected Content'); });
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
        });
        window.addEventListener('blur', () => document.body.style.filter = 'blur(15px)');
        window.addEventListener('focus', () => document.body.style.filter = 'none');
    <\/script>
</head>
<body>
    ${htmlBody}
    <hr>
    <img src="https://branding.yegge.com/LOGO2.1.png" width="120">
    <h6><a href="https://hyperfollow.com/brianyegge" target="_blank">Brian Yegge</a></h6>
</body>
</html>`;

            // 4. Trigger Download
            const blob = new Blob([finalFile], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
