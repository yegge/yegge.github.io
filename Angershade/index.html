            <script>
  // Wait until the iframe is fully loaded
  document.getElementById('myIframe').onload = function() {
    var iframe = document.getElementById('myIframe').contentWindow;
    var links = iframe.document.getElementsByTagName('a');

    // Loop through all links in the iframe
    for (var i = 0; i < links.length; i++) {
      links[i].setAttribute('target', '_top'); // Set each link to open in a new window/tab
    }
  };
</script>

  <script>
    // Load header
    fetch('angershade.com/header.html')
        .then(response => response.text())
        .then(data => {

        .then(data => {
